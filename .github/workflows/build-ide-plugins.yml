name: Build IDE plugins

on:
  workflow_dispatch:
  push:
    paths:
      - 'plugins/**'
      - 'packages/reader-protocol/**'
      - 'scripts/validate-ide-integrations.mjs'

jobs:
  validate-vscode:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run plugins:validate
      - run: node --check plugins/vscode/extension.js
      - run: node --check plugins/vscode/bridge.js
      - run: npx --yes @vscode/vsce@3.6.0 package --allow-missing-repository --allow-star-activation --out novel-library-reader-0.4.3.vsix
        working-directory: plugins/vscode
      - uses: actions/upload-artifact@v4
        with:
          name: novel-library-vscode
          path: plugins/vscode/novel-library-reader-0.4.3.vsix

  build-intellij:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle buildPlugin
        working-directory: plugins/intellij
      - uses: actions/upload-artifact@v4
        with:
          name: novel-library-intellij
          path: plugins/intellij/build/distributions/novel-library-intellij-0.4.1.zip

  build-visual-studio:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: dotnet restore plugins/visual-studio/NovelLibrary.VisualStudio.csproj
      - run: dotnet build plugins/visual-studio/NovelLibrary.VisualStudio.csproj --configuration Release --no-restore
      - name: Package Visual Studio VSIX
        shell: pwsh
        run: ./scripts/package-visual-studio-plugin.ps1 -Root $PWD
      - uses: actions/upload-artifact@v4
        with:
          name: novel-library-visual-studio
          path: plugins/visual-studio/bin/novel-library-visual-studio-0.4.0.vsix
