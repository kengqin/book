name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate desktop build
        run: npm run desktop:web:build

      - name: Validate release metadata
        shell: pwsh
        run: npm run release:validate -- --tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build and publish GitHub Release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: NovelLibrary ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: 正在生成完整版本日志。
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          updaterJsonPreferNsis: true

      - name: Create updater metadata
        id: updater
        shell: pwsh
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart('v')
          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found" }
          $signatureFile = "$($installer.FullName).sig"
          if (-not (Test-Path $signatureFile)) { throw "Updater signature not found" }
          $signature = (Get-Content -Raw $signatureFile).Trim()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$($installer.Name)"
          $releaseManifest = Get-Content -Raw "releases/releases.json" | ConvertFrom-Json
          $release = $releaseManifest.releases | Where-Object { $_.version -eq $version } | Select-Object -First 1
          if (-not $release) { throw "Release metadata not found for $tag" }
          $notes = @($release.sections | ForEach-Object { "$($_.title)：$($_.items -join '；')" }) -join "`n"
          $platform = [ordered]@{ signature = $signature; url = $downloadUrl }
          $metadata = [ordered]@{
            version = $version
            notes = "$($release.title)`n`n$notes"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = $platform
              "windows-x86_64-nsis" = $platform
            }
          }
          $latestFile = Join-Path $PWD "latest.json"
          $metadata | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 $latestFile
          "file=$latestFile" >> $env:GITHUB_OUTPUT

      - name: Create installer checksum
        id: checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found" }
          $checksumFile = "$($installer.FullName).sha256"
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -Encoding ascii $checksumFile
          "file=$checksumFile" >> $env:GITHUB_OUTPUT
          "hash=$hash" >> $env:GITHUB_OUTPUT
          "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          $notesFile = Join-Path $PWD "release-notes.md"
          node scripts/generate-release-notes.mjs --tag=$tag --output=$notesFile --sha256=${{ steps.checksum.outputs.hash }} --installer-name=${{ steps.checksum.outputs.installer_name }}
          "file=$notesFile" >> $env:GITHUB_OUTPUT

      - name: Upload installer checksum
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: NovelLibrary ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            ${{ steps.checksum.outputs.file }}
            ${{ steps.updater.outputs.file }}
