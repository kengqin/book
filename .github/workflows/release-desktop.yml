name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate desktop build
        run: npm run desktop:web:build

      - name: Validate release metadata
        shell: pwsh
        run: npm run release:validate -- --tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build and publish GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: 小说书库 ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: 查看仓库 CHANGELOG.md 与应用内“版本与更新”。
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Create installer checksum
        id: checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found" }
          $checksumFile = "$($installer.FullName).sha256"
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -Encoding ascii $checksumFile
          "file=$checksumFile" >> $env:GITHUB_OUTPUT

      - name: Upload installer checksum
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ steps.checksum.outputs.file }}
