<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18211f" />
    <title>小说书库</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #101a18; }
      #startup-splash { position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center; overflow: hidden; color: #f2f0e7; background: radial-gradient(circle at 50% 35%, #26453d 0, #172722 37%, #0e1715 100%); font-family: "Microsoft YaHei", sans-serif; transition: opacity .38s ease, visibility .38s ease; }
      #startup-splash::before, #startup-splash::after { content: ""; position: absolute; width: 42vmin; height: 42vmin; border: 1px solid rgba(223, 191, 114, .23); border-radius: 50%; animation: startup-orbit 9s linear infinite; }
      #startup-splash::after { width: 68vmin; height: 68vmin; border-color: rgba(137, 192, 176, .13); animation-duration: 14s; animation-direction: reverse; }
      .startup-splash__content { position: relative; z-index: 1; display: grid; justify-items: center; gap: 18px; }
      .startup-splash__mark { position: relative; width: 72px; height: 72px; display: grid; place-items: center; color: #f3dfac; border: 1px solid rgba(243, 223, 172, .7); box-shadow: 0 0 0 8px rgba(243, 223, 172, .06), 0 0 42px rgba(223, 191, 114, .16); animation: startup-breathe 2.6s ease-in-out infinite; }
      .startup-splash__mark::before, .startup-splash__mark::after { content: ""; position: absolute; width: 7px; height: 7px; border: 1px solid #dfbf72; transform: rotate(45deg); }
      .startup-splash__mark::before { top: -5px; left: -5px; }
      .startup-splash__mark::after { right: -5px; bottom: -5px; }
      .startup-splash__book { width: 27px; height: 31px; position: relative; border: 2px solid currentColor; border-radius: 2px 4px 4px 2px; }
      .startup-splash__book::before { content: ""; position: absolute; left: 50%; top: -2px; bottom: -2px; border-left: 1px solid currentColor; }
      .startup-splash__title { margin: 0; font-family: "Noto Serif SC", SimSun, serif; font-size: 27px; letter-spacing: .18em; text-indent: .18em; }
      .startup-splash__subtitle { margin: -10px 0 0; color: #aebfb7; font-size: 10px; letter-spacing: .32em; text-indent: .32em; }
      .startup-splash__loading { display: flex; align-items: center; gap: 8px; margin-top: 9px; color: #d9c58d; font-size: 11px; letter-spacing: .12em; }
      .startup-splash__dots { display: inline-flex; gap: 4px; }
      .startup-splash__dots i { width: 4px; height: 4px; border-radius: 50%; background: currentColor; animation: startup-dot 1.2s ease-in-out infinite; }
      .startup-splash__dots i:nth-child(2) { animation-delay: .16s; }
      .startup-splash__dots i:nth-child(3) { animation-delay: .32s; }
      #startup-splash.startup-splash--leaving { opacity: 0; visibility: hidden; pointer-events: none; }
      @keyframes startup-orbit { to { transform: rotate(360deg); } }
      @keyframes startup-breathe { 50% { transform: translateY(-4px) scale(1.03); box-shadow: 0 0 0 12px rgba(243, 223, 172, .04), 0 0 56px rgba(223, 191, 114, .24); } }
      @keyframes startup-dot { 0%, 60%, 100% { opacity: .28; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
      @media (prefers-reduced-motion: reduce) { #startup-splash::before, #startup-splash::after, .startup-splash__mark, .startup-splash__dots i { animation: none; } }
    </style>
  </head>
  <body>
    <div id="startup-splash" role="status" aria-live="polite" aria-label="正在启动小说书库">
      <div class="startup-splash__content">
        <div class="startup-splash__mark" aria-hidden="true"><span class="startup-splash__book"></span></div>
        <div>
          <p class="startup-splash__title">小说书库</p>
          <p class="startup-splash__subtitle">NOVEL LIBRARY</p>
        </div>
        <div class="startup-splash__loading">正在整理书页 <span class="startup-splash__dots" aria-hidden="true"><i></i><i></i><i></i></span></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
