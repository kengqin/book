apply plugin: 'com.android.application'

def releaseSigningPropertiesFile = rootProject.file('../../../.release-local/android-signing/signing.properties')
def releaseSigningProperties = new Properties()
def releaseSigningReady = false

if (releaseSigningPropertiesFile.exists()) {
    releaseSigningPropertiesFile.withInputStream { releaseSigningProperties.load(it) }

    def requiredSigningProperties = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword']
    def missingSigningProperties = requiredSigningProperties.findAll {
        !releaseSigningProperties.getProperty(it)?.trim()
    }
    if (!missingSigningProperties.isEmpty()) {
        throw new GradleException("Android release signing config is missing: ${missingSigningProperties.join(', ')}")
    }

    def configuredStoreFile = new File(
        releaseSigningPropertiesFile.parentFile,
        releaseSigningProperties.getProperty('storeFile')
    )
    if (!configuredStoreFile.exists()) {
        throw new GradleException("Android release keystore does not exist: ${configuredStoreFile}")
    }
    releaseSigningReady = true
}

android {
    namespace "com.kengqin.novellibrary.mobile"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.kengqin.novellibrary.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "0.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (releaseSigningReady) {
            release {
                storeFile new File(
                    releaseSigningPropertiesFile.parentFile,
                    releaseSigningProperties.getProperty('storeFile')
                )
                storePassword releaseSigningProperties.getProperty('storePassword')
                keyAlias releaseSigningProperties.getProperty('keyAlias')
                keyPassword releaseSigningProperties.getProperty('keyPassword')
                enableV1Signing true
                enableV2Signing true
                enableV3Signing true
                enableV4Signing true
            }
        }
    }
    buildTypes {
        release {
            if (releaseSigningReady) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def requestsReleaseArtifact = graph.allTasks.any { task ->
        task.project == project && task.name in ['assembleRelease', 'bundleRelease']
    }
    if (requestsReleaseArtifact && !releaseSigningReady) {
        throw new GradleException(
            'Android release signing is not configured. Run npm run mobile:android:signing:generate first.'
        )
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
